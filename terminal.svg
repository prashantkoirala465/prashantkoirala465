       NEOFETCH OUTPUT  (rows 1–9)
       appears all at once at t=1.2s
  ══════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="1.20s" dur="0.01s" fill="freeze"/>

    <!-- row 1: blank — skip -->

    <!-- row 2: top border  y=98 -->
    <text x="20" y="98" fill="#3b4261">╭──────────────────────────────────────────────────────────────────────────╮</text>

    <!-- row 3: username + OS  y=118 -->
    <text x="20" y="118">
      <tspan fill="#3b4261">│  </tspan>
      <tspan fill="#7aa2f7" font-weight="bold">prashantkoirala465</tspan>
      <tspan fill="#444b6a">@github</tspan>
      <tspan fill="#3b4261">          </tspan>
      <tspan fill="#565f89">OS </tspan>
      <tspan fill="#cdd6f4">macOS Sequoia (ARM)</tspan>
      <tspan fill="#3b4261">       │</tspan>
    </text>

    <!-- row 4: separator + WM  y=138 -->
    <text x="20" y="138">
      <tspan fill="#3b4261">│  </tspan>
      <tspan fill="#444b6a">──────────────────────────</tspan>
      <tspan fill="#3b4261">          </tspan>
      <tspan fill="#565f89">WM </tspan>
      <tspan fill="#cdd6f4">AeroSpace</tspan>
      <tspan fill="#3b4261">                  │</tspan>
    </text>

    <!-- row 5: blank left + bar  y=158 -->
    <text x="20" y="158">
      <tspan fill="#3b4261">│                                    </tspan>
      <tspan fill="#565f89">Bar    </tspan>
      <tspan fill="#cdd6f4">SketchyBar</tspan>
      <tspan fill="#3b4261">               │</tspan>
    </text>

    <!-- row 6: blank left + editor  y=178 -->
    <text x="20" y="178">
      <tspan fill="#3b4261">│                                    </tspan>
      <tspan fill="#565f89">Editor </tspan>
      <tspan fill="#cdd6f4">Neovim</tspan>
      <tspan fill="#3b4261">                  │</tspan>
    </text>

    <!-- row 7: blank left + shell  y=198 -->
    <text x="20" y="198">
      <tspan fill="#3b4261">│                                    </tspan>
      <tspan fill="#565f89">Shell  </tspan>
      <tspan fill="#cdd6f4">zsh</tspan>
      <tspan fill="#3b4261">                     │</tspan>
    </text>

    <!-- row 8: blank left + term  y=218 -->
    <text x="20" y="218">
      <tspan fill="#3b4261">│                                    </tspan>
      <tspan fill="#565f89">Term   </tspan>
      <tspan fill="#cdd6f4">WezTerm</tspan>
      <tspan fill="#3b4261">                  │</tspan>
    </text>

    <!-- row 9: bottom border  y=238 -->
    <text x="20" y="238" fill="#3b4261">╰──────────────────────────────────────────────────────────────────────────╯</text>

  </g>

  <!-- ── PROMPT 2  (row 10, y=258) ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="2.80s" dur="0.01s" fill="freeze"/>
    <text x="20" y="258" fill="#7aa2f7"> ~/</text>
