<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace">

  <!-- Window background -->
  <rect width="800" height="540" rx="10" ry="10" fill="#1c1c1c"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" ry="10" fill="#2d2d2d"/>
  <rect y="18" width="800" height="18" fill="#2d2d2d"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="23" text-anchor="middle" fill="#808080" font-size="12" font-family="'JetBrains Mono', 'Fira Code', monospace">prashantkoirala465 — zsh</text>

  <!-- Terminal content area -->
  <rect x="0" y="36" width="800" height="504" rx="0" ry="0" fill="#0d1117"/>
  <rect x="0" y="36" width="800" height="504" rx="0" ry="0" fill="#0d1117"/>
  <!-- round bottom corners -->
  <rect x="0" y="504" width="800" height="36" fill="#0d1117"/>
  <rect x="0" y="504" width="800" height="36" rx="0" ry="0" fill="#0d1117"/>
  <rect x="0" y="510" width="800" height="30" rx="10" ry="10" fill="#0d1117"/>

  <style>
    .prompt  { fill: #00ff41; }
    .cmd     { fill: #e6edf3; }
    .out-key { fill: #00ff41; }
    .out-val { fill: #8b949e; }
    .out-dim { fill: #484f58; }
    .out-tag { fill: #388bfd; }
    .out-hot { fill: #f0883e; }
    .cursor  { fill: #00ff41; }
    text { font-size: 13.5px; font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }

    /* ── typing keyframes ── */
    /* Each block: opacity 0 until its turn, then 1 */

    /* line 1 prompt — appears at 0s */
    .l1p { animation: appear 0s forwards; opacity: 1; }

    /* "whoami" types from t=0.3s, 6 chars × 60ms = 0.36s done at 0.66s */
    .l1c { opacity: 0; animation: appear 0.3s forwards; }

    /* output block 1 — appears at 0.9s */
    .b1  { opacity: 0; animation: appear 0.9s forwards; }

    /* line 2 prompt — appears at 1.6s */
    .l2p { opacity: 0; animation: appear 1.6s forwards; }

    /* "cat .config" types from t=1.9s, 11 chars × 55ms = 0.6s done at 2.5s */
    .l2c { opacity: 0; animation: appear 1.9s forwards; }

    /* output block 2 — appears at 2.8s */
    .b2  { opacity: 0; animation: appear 2.8s forwards; }

    /* line 3 prompt — appears at 3.8s */
    .l3p { opacity: 0; animation: appear 3.8s forwards; }

    /* "ls projects/" types from t=4.1s */
    .l3c { opacity: 0; animation: appear 4.1s forwards; }

    /* output block 3 — appears at 4.7s */
    .b3  { opacity: 0; animation: appear 4.7s forwards; }

    /* final prompt — appears at 6.2s */
    .l4p { opacity: 0; animation: appear 6.2s forwards; }

    /* blinking cursor after final prompt */
    .blink { opacity: 0; animation: appear 6.2s forwards, blink-cursor 1s 6.2s step-end infinite; }

    @keyframes appear {
      to { opacity: 1; }
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* typed characters — staggered per-char via inline style */
    .typed { opacity: 0; animation: appear var(--d, 0s) var(--t, 0s) forwards; }
  </style>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LINE 1: prompt + whoami                            -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g transform="translate(24, 72)">
    <text class="l1p"><tspan class="prompt">prashant</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">macbook</tspan><tspan fill="#484f58"> ~ </tspan><tspan class="prompt">%</tspan><tspan fill="#0d1117"> </tspan></text>

    <!-- "whoami" typed -->
    <text x="198" class="cmd">
      <tspan class="typed" style="--t:0.30s">w</tspan><tspan class="typed" style="--t:0.36s">h</tspan><tspan class="typed" style="--t:0.42s">o</tspan><tspan class="typed" style="--t:0.48s">a</tspan><tspan class="typed" style="--t:0.54s">m</tspan><tspan class="typed" style="--t:0.60s">i</tspan>
    </text>
  </g>

  <!-- OUTPUT BLOCK 1: whoami -->
  <g class="b1" transform="translate(24, 92)">
    <text y="18"><tspan class="out-key">  name      </tspan><tspan class="out-val">Prashant Koirala</tspan></text>
    <text y="36"><tspan class="out-key">  location  </tspan><tspan class="out-val">Kathmandu, Nepal</tspan></text>
    <text y="54"><tspan class="out-key">  web        </tspan><tspan class="out-val">prashantkoirala.info.np</tspan></text>
    <text y="72"><tspan class="out-key">  status     </tspan><tspan class="out-val">building </tspan><tspan class="out-hot">AlgoLab</tspan></text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LINE 2: prompt + cat .config                       -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g transform="translate(24, 180)">
    <text class="l2p"><tspan class="prompt">prashant</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">macbook</tspan><tspan fill="#484f58"> ~ </tspan><tspan class="prompt">%</tspan><tspan fill="#0d1117"> </tspan></text>

    <!-- "cat .config" typed -->
    <text x="198" class="cmd">
      <tspan class="typed" style="--t:1.90s">c</tspan><tspan class="typed" style="--t:1.96s">a</tspan><tspan class="typed" style="--t:2.02s">t</tspan><tspan class="typed" style="--t:2.08s"> </tspan><tspan class="typed" style="--t:2.14s">.</tspan><tspan class="typed" style="--t:2.20s">c</tspan><tspan class="typed" style="--t:2.26s">o</tspan><tspan class="typed" style="--t:2.32s">n</tspan><tspan class="typed" style="--t:2.38s">f</tspan><tspan class="typed" style="--t:2.44s">i</tspan><tspan class="typed" style="--t:2.50s">g</tspan>
    </text>
  </g>

  <!-- OUTPUT BLOCK 2: .config -->
  <g class="b2" transform="translate(24, 200)">
    <text y="18"><tspan class="out-key">  os        </tspan><tspan class="out-val">macOS Sequoia (ARM)</tspan></text>
    <text y="36"><tspan class="out-key">  wm        </tspan><tspan class="out-val">AeroSpace</tspan></text>
    <text y="54"><tspan class="out-key">  bar       </tspan><tspan class="out-val">SketchyBar</tspan></text>
    <text y="72"><tspan class="out-key">  editor    </tspan><tspan class="out-val">Neovim</tspan></text>
    <text y="90"><tspan class="out-key">  shell     </tspan><tspan class="out-val">zsh</tspan></text>
    <text y="108"><tspan class="out-key">  term      </tspan><tspan class="out-val">WezTerm</tspan></text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LINE 3: prompt + ls projects/                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g transform="translate(24, 326)">
    <text class="l3p"><tspan class="prompt">prashant</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">macbook</tspan><tspan fill="#484f58"> ~ </tspan><tspan class="prompt">%</tspan><tspan fill="#0d1117"> </tspan></text>

    <!-- "ls projects/" typed -->
    <text x="198" class="cmd">
      <tspan class="typed" style="--t:4.10s">l</tspan><tspan class="typed" style="--t:4.16s">s</tspan><tspan class="typed" style="--t:4.22s"> </tspan><tspan class="typed" style="--t:4.28s">p</tspan><tspan class="typed" style="--t:4.34s">r</tspan><tspan class="typed" style="--t:4.40s">o</tspan><tspan class="typed" style="--t:4.46s">j</tspan><tspan class="typed" style="--t:4.52s">e</tspan><tspan class="typed" style="--t:4.58s">c</tspan><tspan class="typed" style="--t:4.64s">t</tspan><tspan class="typed" style="--t:4.70s">s</tspan><tspan class="typed" style="--t:4.76s">/</tspan>
    </text>
  </g>

  <!-- OUTPUT BLOCK 3: projects -->
  <g class="b3" transform="translate(24, 346)">
    <text y="18">
      <tspan class="out-hot">Singularity        </tspan><tspan class="out-tag">Three.js WebGPU GLSL</tspan>
    </text>
    <text y="36">
      <tspan class="out-hot">AlgoLab            </tspan><tspan class="out-tag">TypeScript  </tspan><tspan class="out-key">[active]</tspan>
    </text>
    <text y="54">
      <tspan class="out-hot">Sign2Text           </tspan><tspan class="out-tag">Python CV JavaScript</tspan>
    </text>
    <text y="72">
      <tspan class="out-hot">BusTracker          </tspan><tspan class="out-tag">C++ Arduino ESP8266</tspan>
    </text>
    <text y="90">
      <tspan class="out-hot">web-portfolio       </tspan><tspan class="out-tag">GSAP Lenis JS  </tspan><tspan fill="#e3b341">⭐54</tspan>
    </text>
    <text y="108">
      <tspan class="out-hot">ASCII-Art-Generator </tspan><tspan class="out-tag">Rust Cargo CLI</tspan>
    </text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LINE 4: final prompt + blinking cursor             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g transform="translate(24, 470)">
    <text class="l4p"><tspan class="prompt">prashant</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">macbook</tspan><tspan fill="#484f58"> ~ </tspan><tspan class="prompt">%</tspan><tspan fill="#0d1117"> </tspan></text>
    <rect class="blink" x="198" y="-14" width="8" height="17" rx="1"/>
  </g>

</svg>
