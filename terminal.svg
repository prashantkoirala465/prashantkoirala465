  </rect>


  <!-- ======================================================
       GIT LOG OUTPUT  (t=7.0s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.0s" dur="0.01s" fill="freeze"/>

    <text x="20" y="438" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">3a1f2b </tspan><tspan fill="#e6edf3">feat: add sorting visualizer </tspan><tspan fill="#39c5cf">(AlgoLab)</tspan>
    </text>

    <text x="20" y="456" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">9c4e7d </tspan><tspan fill="#e6edf3">feat: gravitational lensing shader </tspan><tspan fill="#39c5cf">(Singularity)</tspan>
    </text>

    <text x="20" y="474" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">2b8f1a </tspan><tspan fill="#e6edf3">fix: responsive layout </tspan><tspan fill="#39c5cf">(web-portfolio)</tspan>
    </text>

    <text x="20" y="492" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">d5a3c0 </tspan><tspan fill="#e6edf3">feat: network device profiler </tspan><tspan fill="#39c5cf">(Recona)</tspan>
    </text>
  </g>


  <!-- ======================================================
       FINAL PROMPT + blinking cursor  (t=8.0s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="8.0s" dur="0.01s" fill="freeze"/>

    <text x="20" y="510" font-size="13">
      <tspan fill="#3fb950">prashantkoirala465</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">github</tspan><tspan fill="#e6edf3">:~$ </tspan>
