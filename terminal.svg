  <text x="196" y="298" font-size="13" fill="#c0caf5" opacity="0">z<animate attributeName="opacity" from="0" to="1" begin="6.17s" dur="0.01s" fill="freeze"/></text>
  <text x="204" y="298" font-size="13" fill="#c0caf5" opacity="0">a<animate attributeName="opacity" from="0" to="1" begin="6.24s" dur="0.01s" fill="freeze"/></text>
  <text x="212" y="298" font-size="13" fill="#c0caf5" opacity="0"> <animate attributeName="opacity" from="0" to="1" begin="6.31s" dur="0.01s" fill="freeze"/></text>
  <text x="220" y="298" font-size="13" fill="#9ece6a" opacity="0">-<animate attributeName="opacity" from="0" to="1" begin="6.38s" dur="0.01s" fill="freeze"/></text>
  <text x="228" y="298" font-size="13" fill="#9ece6a" opacity="0">-<animate attributeName="opacity" from="0" to="1" begin="6.45s" dur="0.01s" fill="freeze"/></text>
  <text x="236" y="298" font-size="13" fill="#9ece6a" opacity="0">i<animate attributeName="opacity" from="0" to="1" begin="6.52s" dur="0.01s" fill="freeze"/></text>
  <text x="244" y="298" font-size="13" fill="#9ece6a" opacity="0">c<animate attributeName="opacity" from="0" to="1" begin="6.59s" dur="0.01s" fill="freeze"/></text>
  <text x="252" y="298" font-size="13" fill="#9ece6a" opacity="0">o<animate attributeName="opacity" from="0" to="1" begin="6.66s" dur="0.01s" fill="freeze"/></text>
