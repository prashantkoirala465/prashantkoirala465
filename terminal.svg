  <text x="268" y="298" font-size="13" fill="#9ece6a" opacity="0">s<animate attributeName="opacity" from="0" to="1" begin="6.80s" dur="0.01s" fill="freeze"/></text>
  <text x="276" y="298" font-size="13" fill="#c0caf5" opacity="0"> <animate attributeName="opacity" from="0" to="1" begin="6.87s" dur="0.01s" fill="freeze"/></text>
  <text x="284" y="298" font-size="13" fill="#ff9e64" opacity="0">p<animate attributeName="opacity" from="0" to="1" begin="6.94s" dur="0.01s" fill="freeze"/></text>
