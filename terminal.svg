<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <defs>
    <style>text { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }</style>

    <clipPath id="clip1">
      <rect x="246" y="40" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="0.3s" dur="0.6s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="clip2">
      <rect x="246" y="140" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="2.0s" dur="0.7s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="clip3">
      <rect x="246" y="274" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="4.0s" dur="0.7s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="clip4">
      <rect x="246" y="406" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="6.2s" dur="0.8s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="760" height="520" rx="10" fill="#0d1117"/>

  <!-- title bar -->
  <rect width="760" height="36" rx="10" fill="#161b22"/>
  <rect y="18" width="760" height="18" fill="#161b22"/>

  <!-- traffic lights -->
