  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- title -->
  <text x="380" y="23" text-anchor="middle" font-size="12" fill="#484f58">prashantkoirala465 — zsh</text>

  <!-- terminal body -->
  <rect x="0" y="36" width="760" height="484" fill="#0d1117"/>


  <!-- ======================================================
       PROMPT 1  (always visible at t=0)
       ====================================================== -->

  <text x="20" y="54" font-size="13">
    <tspan fill="#3fb950">prashantkoirala465</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">github</tspan><tspan fill="#e6edf3">:~$ </tspan>
  </text>

  <text x="246" y="54" font-size="13" fill="#e6edf3" clip-path="url(#clip1)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.01s" fill="freeze"/>
    whoami
  </text>

  <rect x="246" y="41" width="7" height="13" rx="1" fill="#e6edf3">
    <animate attributeName="x" from="246" to="293" begin="0.3s" dur="0.6s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="0.9s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- ======================================================
       WHOAMI OUTPUT  (t=0.9s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.01s" fill="freeze"/>

    <!-- name line -->
    <text x="20" y="72" font-size="13">
      <tspan fill="#484f58">  name:     </tspan><tspan fill="#e6edf3" font-weight="bold">Prashant Koirala</tspan>
    </text>

    <!-- location line -->
    <text x="20" y="90" font-size="13">
      <tspan fill="#484f58">  location: </tspan><tspan fill="#39c5cf">Kathmandu, Nepal</tspan>
    </text>

    <!-- web line -->
    <text x="20" y="108" font-size="13">
      <tspan fill="#484f58">  web:      </tspan><tspan fill="#58a6ff">prashantkoirala.info.np</tspan>
    </text>

    <!-- stats line -->
    <text x="20" y="126" font-size="13">
      <tspan fill="#484f58">  repos: </tspan><tspan fill="#e3b341">51</tspan>
      <tspan fill="#484f58">   followers: </tspan><tspan fill="#e3b341">43</tspan>
      <tspan fill="#484f58">   hireable: </tspan><tspan fill="#3fb950">true</tspan>
    </text>
  </g>


  <!-- ======================================================
       PROMPT 2  (t=2.0s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.01s" fill="freeze"/>
    <text x="20" y="154" font-size="13">
      <tspan fill="#3fb950">prashantkoirala465</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">github</tspan><tspan fill="#e6edf3">:~$ </tspan>
