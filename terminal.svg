  <text x="140" y="258" fill="#cdd6f4" opacity="0">e<animate attributeName="opacity" from="0" to="1" begin="3.20s" dur="0.01s" fill="freeze"/></text>
  <text x="148" y="258" fill="#cdd6f4" opacity="0">z<animate attributeName="opacity" from="0" to="1" begin="3.27s" dur="0.01s" fill="freeze"/></text>
  <text x="156" y="258" fill="#cdd6f4" opacity="0">a<animate attributeName="opacity" from="0" to="1" begin="3.34s" dur="0.01s" fill="freeze"/></text>
  <text x="164" y="258" fill="#cdd6f4" opacity="0"> <animate attributeName="opacity" from="0" to="1" begin="3.41s" dur="0.01s" fill="freeze"/></text>
  <text x="172" y="258" fill="#9ece6a" opacity="0">-<animate attributeName="opacity" from="0" to="1" begin="3.48s" dur="0.01s" fill="freeze"/></text>
  <text x="180" y="258" fill="#9ece6a" opacity="0">-<animate attributeName="opacity" from="0" to="1" begin="3.55s" dur="0.01s" fill="freeze"/></text>
  <text x="188" y="258" fill="#9ece6a" opacity="0">l<animate attributeName="opacity" from="0" to="1" begin="3.62s" dur="0.01s" fill="freeze"/></text>
  <text x="196" y="258" fill="#9ece6a" opacity="0">o<animate attributeName="opacity" from="0" to="1" begin="3.69s" dur="0.01s" fill="freeze"/></text>
  <text x="204" y="258" fill="#9ece6a" opacity="0">n<animate attributeName="opacity" from="0" to="1" begin="3.76s" dur="0.01s" fill="freeze"/></text>
  <text x="212" y="258" fill="#9ece6a" opacity="0">g<animate attributeName="opacity" from="0" to="1" begin="3.83s" dur="0.01s" fill="freeze"/></text>

  <!-- typing cursor line 2 -->
  <rect x="220" y="244" width="7" height="14" rx="1" fill="#9ece6a" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.20s" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="4.05s" dur="0.01s" fill="freeze"/>
  </rect>

  <!-- ══════════════════════════════════════════
       EZA OUTPUT  (rows 11–18)
       appears all at once at t=4.1s
  ══════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="4.10s" dur="0.01s" fill="freeze"/>

    <!-- header row  y=278 -->
    <text x="20" y="278">
      <tspan fill="#444b6a">Permissions  Size  Date Modified  Name</tspan>
    </text>

    <!-- Singularity  y=298 -->
    <text x="20" y="298">
      <tspan fill="#565f89">drwxr-xr-x     -  </tspan>
      <tspan fill="#444b6a">Mar  7 2025  </tspan>
      <tspan fill="#7aa2f7">Singularity</tspan>
      <tspan fill="#444b6a">         Three.js · WebGPU · GLSL</tspan>
    </text>

    <!-- AlgoLab  y=318 -->
    <text x="20" y="318">
      <tspan fill="#565f89">drwxr-xr-x     -  </tspan>
      <tspan fill="#444b6a">Mar  7 2025  </tspan>
      <tspan fill="#7aa2f7">AlgoLab</tspan>
      <tspan fill="#9ece6a">             [active]</tspan>
      <tspan fill="#444b6a">     TypeScript</tspan>
    </text>

    <!-- Sign2Text  y=338 -->
    <text x="20" y="338">
      <tspan fill="#565f89">drwxr-xr-x     -  </tspan>
      <tspan fill="#444b6a">Feb 28 2025  </tspan>
      <tspan fill="#7aa2f7">Sign2Text</tspan>
      <tspan fill="#444b6a">            Python · CV · JS</tspan>
    </text>

    <!-- BusTracker  y=358 -->
    <text x="20" y="358">
      <tspan fill="#565f89">drwxr-xr-x     -  </tspan>
      <tspan fill="#444b6a">Feb 14 2025  </tspan>
      <tspan fill="#7aa2f7">BusTracker</tspan>
      <tspan fill="#444b6a">          C++ · Arduino · ESP8266</tspan>
    </text>

    <!-- web-portfolio  y=378 -->
    <text x="20" y="378">
      <tspan fill="#565f89">drwxr-xr-x     -  </tspan>
      <tspan fill="#444b6a">Jan 30 2025  </tspan>
      <tspan fill="#7aa2f7">web-portfolio</tspan>
      <tspan fill="#e0af68">        ★ 54</tspan>
      <tspan fill="#444b6a">     GSAP · Lenis</tspan>
    </text>

    <!-- ASCII-Art-Generator  y=398 -->
    <text x="20" y="398">
      <tspan fill="#565f89">drwxr-xr-x     -  </tspan>
      <tspan fill="#444b6a">Jan 12 2025  </tspan>
      <tspan fill="#7aa2f7">ASCII-Art-Generator</tspan>
      <tspan fill="#444b6a">  Rust · Cargo · CLI</tspan>
    </text>

  </g>

  <!-- ── PROMPT 3 / FINAL  (row 20, y=438) ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="5.50s" dur="0.01s" fill="freeze"/>
    <text x="20" y="438" fill="#7aa2f7"> ~/</text>
    <text x="44" y="438" fill="#73daca">  ⎇ main</text>
    <text x="124" y="438" fill="#9ece6a">  ❯</text>
    <!-- blinking block cursor -->
    <rect x="140" y="424" width="7" height="14" rx="1" fill="#9ece6a">
      <animate attributeName="opacity" values="1;0;1" dur="1.0s"
               begin="5.50s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
