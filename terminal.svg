<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 488" width="800" height="488"
     font-family="'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace"
     font-size="13.5">

  <!-- ══════════════════════════════════════════
       WINDOW SHELL
  ══════════════════════════════════════════ -->

  <!-- outer border / shadow -->
  <rect width="800" height="488" rx="10" ry="10" fill="#11121a"/>

  <!-- title bar -->
  <rect width="800" height="38" rx="10" ry="10" fill="#1e2030"/>
  <rect y="20" width="800" height="18" fill="#1e2030"/>

  <!-- traffic lights -->
  <circle cx="20" cy="19" r="5.5" fill="#ff5f57"/>
  <circle cx="38" cy="19" r="5.5" fill="#febc2e"/>
  <circle cx="56" cy="19" r="5.5" fill="#28c840"/>

  <!-- window title -->
  <text x="400" y="23.5" text-anchor="middle"
        fill="#444b6a" font-size="11.5"
        font-family="'JetBrains Mono','Fira Code',monospace">
    zsh  ·  ~/  ·  prashantkoirala465
  </text>

  <!-- terminal body -->
  <rect x="0" y="38" width="800" height="450" fill="#0d1117"/>
  <!-- round bottom corners -->
  <rect x="0" y="450" width="800" height="38" fill="#0d1117"/>
  <rect x="0" y="462" width="800" height="26" rx="10" ry="10" fill="#11121a"/>
  <rect x="0" y="462" width="800" height="13" fill="#0d1117"/>

  <!-- ══════════════════════════════════════════
       GRID: font-size 13.5px, char-width ~8px,
             line-height 20px, left-pad 20px
             first baseline y = 58
  ══════════════════════════════════════════ -->

  <!-- ── PROMPT 1  (row 0, y=58) ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="0.0s" dur="0.01s" fill="freeze"/>
    <!-- ~/  in blue -->
    <text x="20" y="58" fill="#7aa2f7"> ~/</text>
    <!-- ⎇ main  in teal -->
    <text x="44" y="58" fill="#73daca">  ⎇ main</text>
    <!-- ❯ in green -->
    <text x="124" y="58" fill="#9ece6a">  ❯</text>
  </g>

  <!-- ── "neofetch" typed  (starts col 15, x=140, y=58) ── -->
  <text x="140" y="58" fill="#cdd6f4" opacity="0">n<animate attributeName="opacity" from="0" to="1" begin="0.40s" dur="0.01s" fill="freeze"/></text>
  <text x="148" y="58" fill="#cdd6f4" opacity="0">e<animate attributeName="opacity" from="0" to="1" begin="0.48s" dur="0.01s" fill="freeze"/></text>
  <text x="156" y="58" fill="#cdd6f4" opacity="0">o<animate attributeName="opacity" from="0" to="1" begin="0.56s" dur="0.01s" fill="freeze"/></text>
  <text x="164" y="58" fill="#cdd6f4" opacity="0">f<animate attributeName="opacity" from="0" to="1" begin="0.64s" dur="0.01s" fill="freeze"/></text>
  <text x="172" y="58" fill="#cdd6f4" opacity="0">e<animate attributeName="opacity" from="0" to="1" begin="0.72s" dur="0.01s" fill="freeze"/></text>
  <text x="180" y="58" fill="#cdd6f4" opacity="0">t<animate attributeName="opacity" from="0" to="1" begin="0.80s" dur="0.01s" fill="freeze"/></text>
  <text x="188" y="58" fill="#cdd6f4" opacity="0">c<animate attributeName="opacity" from="0" to="1" begin="0.88s" dur="0.01s" fill="freeze"/></text>
  <text x="196" y="58" fill="#cdd6f4" opacity="0">h<animate attributeName="opacity" from="0" to="1" begin="0.96s" dur="0.01s" fill="freeze"/></text>

  <!-- typing cursor line 1 -->
  <rect x="204" y="44" width="7" height="14" rx="1" fill="#9ece6a" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.40s" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="1.15s" dur="0.01s" fill="freeze"/>
  </rect>

