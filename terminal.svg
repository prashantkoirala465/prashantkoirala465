    <text x="37" y="246" font-size="13">
      <tspan fill="#58a6ff">Sign2Text</tspan><tspan fill="#30363d">/</tspan>
      <tspan fill="#484f58">   ML + CV   </tspan>
      <tspan fill="#e3b341">★ 9</tspan>
    </text>

    <!-- UI-UX-Project  design blue -->
    <circle cx="28" cy="259" r="4" fill="#58a6ff"/>
    <text x="37" y="264" font-size="13">
      <tspan fill="#58a6ff">UI-UX-Project</tspan><tspan fill="#30363d">/</tspan>
      <tspan fill="#484f58">   Figma   </tspan>
      <tspan fill="#e3b341">★ 17</tspan>
    </text>
  </g>


