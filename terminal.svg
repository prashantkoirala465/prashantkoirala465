<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <defs>
    <style>text { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }</style>

    <clipPath id="clip1">
      <rect x="246" y="40" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="0.3s" dur="0.6s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="clip2">
      <rect x="246" y="140" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="2.0s" dur="0.7s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="clip3">
      <rect x="246" y="220" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="3.6s" dur="0.6s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="clip4">
      <rect x="246" y="280" width="0" height="18">
        <animate attributeName="width" from="0" to="514" begin="5.0s" dur="0.8s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="760" height="480" rx="10" fill="#0d1117"/>

  <!-- title bar -->
  <rect width="760" height="36" rx="10" fill="#161b22"/>
  <rect y="18" width="760" height="18" fill="#161b22"/>

  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- title -->
  <text x="380" y="23" text-anchor="middle" font-size="12" fill="#484f58">prashantkoirala465 — zsh</text>

  <!-- terminal body -->
  <rect x="0" y="36" width="760" height="444" fill="#0d1117"/>


  <!-- ======================================================
       PROMPT 1  (always visible)
       ====================================================== -->

  <text x="20" y="54" font-size="13">
    <tspan fill="#484f58">prashantkoirala465</tspan><tspan fill="#30363d">@</tspan><tspan fill="#484f58">github</tspan><tspan fill="#30363d">:~$</tspan><tspan fill="#484f58"> </tspan>
  </text>

  <!-- cmd1 "whoami" — revealed by clip1 wipe, starts hidden -->
  <text x="246" y="54" font-size="13" fill="#e6edf3" clip-path="url(#clip1)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.01s" fill="freeze"/>
    whoami
  </text>

  <!-- cursor1 -->
  <rect x="246" y="41" width="7" height="13" rx="1" fill="#e6edf3">
    <animate attributeName="x" from="246" to="293" begin="0.3s" dur="0.6s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="0.9s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- ======================================================
       WHOAMI OUTPUT  (fades in at t=0.9s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.01s" fill="freeze"/>

    <!-- line 1: name -->
    <text x="20" y="74" font-size="13" fill="#e6edf3">  Prashant Koirala</text>

    <!-- line 2: location | website -->
    <text x="20" y="94" font-size="13">
      <tspan fill="#484f58">  Kathmandu, Nepal  |  </tspan><tspan fill="#58a6ff">github.com/prashantkoirala465</tspan>
    </text>

    <!-- line 3: stats -->
    <text x="20" y="114" font-size="13">
      <tspan fill="#484f58">  37 repos  |  22 followers  |  hireable: </tspan><tspan fill="#3fb950">true</tspan>
    </text>
  </g>


  <!-- ======================================================
       PROMPT 2  (fades in at t=2.0s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.01s" fill="freeze"/>
    <text x="20" y="154" font-size="13">
      <tspan fill="#484f58">prashantkoirala465</tspan><tspan fill="#30363d">@</tspan><tspan fill="#484f58">github</tspan><tspan fill="#30363d">:~$</tspan><tspan fill="#484f58"> </tspan>
    </text>
  </g>

  <!-- cmd2 "ls projects/" -->
  <text x="246" y="154" font-size="13" fill="#e6edf3" clip-path="url(#clip2)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.01s" fill="freeze"/>
    ls projects/
  </text>

  <!-- cursor2 -->
  <rect x="246" y="141" width="7" height="13" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="246" to="340" begin="2.0s" dur="0.7s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="2.7s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- ======================================================
       LS OUTPUT  (fades in at t=2.7s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.01s" fill="freeze"/>

    <text x="20" y="174" font-size="13">
      <tspan fill="#58a6ff">  web-development-portfolio/</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#58a6ff">AlgoLab/</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#58a6ff">pomodoro-tui/</tspan>
    </text>

    <text x="20" y="194" font-size="13">
      <tspan fill="#58a6ff">  Appointment-Management-System/</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#58a6ff">DCS-403-Assignments-PK/</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#58a6ff">UI-UX-Project/</tspan>
    </text>
  </g>


  <!-- ======================================================
       PROMPT 3  (fades in at t=3.6s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.01s" fill="freeze"/>
    <text x="20" y="234" font-size="13">
      <tspan fill="#484f58">prashantkoirala465</tspan><tspan fill="#30363d">@</tspan><tspan fill="#484f58">github</tspan><tspan fill="#30363d">:~$</tspan><tspan fill="#484f58"> </tspan>
    </text>
  </g>

  <!-- cmd3 "cat languages.txt" -->
  <text x="246" y="234" font-size="13" fill="#e6edf3" clip-path="url(#clip3)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.01s" fill="freeze"/>
    cat languages.txt
  </text>

  <!-- cursor3 -->
  <rect x="246" y="221" width="7" height="13" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="246" to="379" begin="3.6s" dur="0.6s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="4.2s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- ======================================================
       LANGUAGES OUTPUT  (fades in at t=4.2s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.01s" fill="freeze"/>

    <text x="20" y="254" font-size="13">
      <tspan fill="#e6edf3">  JavaScript</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#e6edf3">TypeScript</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#e6edf3">C++</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#e6edf3">C#</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#e6edf3">Python</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#e6edf3">HTML/CSS</tspan>
    </text>
  </g>


  <!-- ======================================================
       PROMPT 4  (fades in at t=5.0s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.01s" fill="freeze"/>
    <text x="20" y="294" font-size="13">
      <tspan fill="#484f58">prashantkoirala465</tspan><tspan fill="#30363d">@</tspan><tspan fill="#484f58">github</tspan><tspan fill="#30363d">:~$</tspan><tspan fill="#484f58"> </tspan>
    </text>
  </g>

  <!-- cmd4: git log oneline graph -->
  <text x="246" y="294" font-size="13" fill="#e6edf3" clip-path="url(#clip4)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.01s" fill="freeze"/>
    git log --oneline --graph
  </text>

  <!-- cursor4 -->
  <rect x="246" y="281" width="7" height="13" rx="1" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="246" to="433" begin="5.0s" dur="0.8s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="5.8s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- ======================================================
       GIT LOG OUTPUT  (fades in at t=5.8s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.8s" dur="0.01s" fill="freeze"/>

    <text x="20" y="314" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">3a1f2b </tspan><tspan fill="#e6edf3">feat: add sorting visualizer </tspan><tspan fill="#39c5cf">(AlgoLab)</tspan>
    </text>

    <text x="20" y="334" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">9c4e7d </tspan><tspan fill="#e6edf3">feat: pomodoro timer TUI</tspan>
    </text>

    <text x="20" y="354" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">2b8f1a </tspan><tspan fill="#e6edf3">fix: responsive layout </tspan><tspan fill="#39c5cf">(web-portfolio)</tspan>
    </text>

    <text x="20" y="374" font-size="13">
      <tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">d5a3c0 </tspan><tspan fill="#e6edf3">init: Appointment Management System</tspan>
    </text>
  </g>


  <!-- ======================================================
       FINAL PROMPT + blinking cursor  (fades in at t=6.8s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="6.8s" dur="0.01s" fill="freeze"/>

    <text x="20" y="414" font-size="13">
      <tspan fill="#484f58">prashantkoirala465</tspan><tspan fill="#30363d">@</tspan><tspan fill="#484f58">github</tspan><tspan fill="#30363d">:~$</tspan><tspan fill="#484f58"> </tspan>
    </text>

    <rect x="246" y="401" width="7" height="13" rx="1" fill="#e6edf3">
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="6.8s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
