<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520"
  font-family="'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace">

  <!-- ── outer window shell ── -->
  <rect width="800" height="520" rx="12" ry="12" fill="#1a1b26"/>

  <!-- ── title bar ── -->
  <rect width="800" height="38" rx="12" ry="12" fill="#24283b"/>
  <rect y="20" width="800" height="18" fill="#24283b"/>

  <!-- traffic lights -->
  <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="6" fill="#febc2e"/>
  <circle cx="66" cy="19" r="6" fill="#28c840"/>

  <!-- title -->
  <text x="400" y="24" text-anchor="middle"
        fill="#565f89" font-size="12"
        font-family="'JetBrains Mono','Fira Code',monospace">
    zsh  ·  ~/  ·  prashantkoirala465
  </text>

  <!-- ── terminal body ── -->
  <rect x="0" y="38" width="800" height="482" fill="#0d1117"/>
  <!-- round bottom corners -->
  <rect x="0" y="482" width="800" height="38" fill="#0d1117"/>
  <rect x="0" y="494" width="800" height="26" rx="12" ry="12" fill="#1a1b26"/>
  <rect x="0" y="494" width="800" height="13" fill="#0d1117"/>

  <!--
  ═══════════════════════════════════════════════════════════════
  TIMING MAP  (all via SMIL <animate> — works in GitHub SVG)
  ═══════════════════════════════════════════════════════════════

  t=0.0s   prompt 1 appears
  t=0.5s   "whoami" types  (7 chars × 80ms = 0.56s  →  done ~1.1s)
  t=1.3s   output block 1 appears  (4 lines, each 130ms apart)
  t=2.5s   prompt 2 appears
  t=3.0s   "cat about.txt" types  (14 chars × 70ms = 0.98s → done ~4.0s)
  t=4.2s   output block 2 appears  (6 lines, each 120ms apart)
  t=5.6s   prompt 3 appears
  t=6.1s   "eza --icons projects/" types  (22 chars × 65ms → done ~7.5s)
  t=7.8s   output block 3 appears  (6 lines, each 100ms apart)
  t=9.5s   prompt 4 (final) + blinking cursor
  total loop: 12s
  ═══════════════════════════════════════════════════════════════
  -->

  <!-- ── FONT SIZE & LINE HEIGHT ──
       font-size: 13px, line-height: 22px
       p10k prompt seg heights: 22px tall, content starts at y baseline
  -->

  <!-- ════════════════════════════════════════════
       PROMPT HELPER — rendered as colored segments
       Segment 1:  bg=#3d59a1  " ~/  "  (dir)
       Arrow:       #3d59a1 → #1a1b26  (powerline \uE0B0)
       Segment 2:  bg=#41a6b5  " main "  (git branch, icon \uE0A0)
       Arrow:       #41a6b5 → #1a1b26
       Then:  ❯  in green
       ════════════════════════════════════════════ -->

  <!-- ── PROMPT MACRO (reusable via <use>) ──
       We'll just paste it 4 times at different Y positions.
       Each prompt group is a <g> with SMIL opacity animation.
  -->

  <!-- ══ LINE 1: PROMPT 1 ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="0s" dur="0.01s" fill="freeze"/>
    <!-- dir segment bg -->
    <rect x="16" y="54" width="58" height="22" rx="3" fill="#3d59a1"/>
    <!-- dir text -->
    <text x="24" y="70" font-size="13" fill="#c0caf5"> ~/</text>
    <!-- powerline arrow dir→bg -->
    <text x="72" y="70" font-size="22" fill="#3d59a1" textLength="12">&#xE0B0;</text>
    <!-- git segment bg -->
    <rect x="84" y="54" width="72" height="22" rx="3" fill="#41a6b5"/>
    <!-- git icon + branch -->
    <text x="92" y="70" font-size="13" fill="#1a1b26"> &#xE0A0; main</text>
    <!-- powerline arrow git→bg -->
    <text x="154" y="70" font-size="22" fill="#41a6b5" textLength="12">&#xE0B0;</text>
    <!-- zsh prompt char -->
    <text x="172" y="70" font-size="13" fill="#9ece6a">❯</text>
  </g>

  <!-- ══ "whoami" typed ══ -->
  <!-- char 1 "w" -->
  <text x="188" y="70" font-size="13" fill="#c0caf5" opacity="0">w
    <animate attributeName="opacity" from="0" to="1"
             begin="0.50s" dur="0.01s" fill="freeze"/>
  </text>
  <!-- char 2 "h" -->
  <text x="196" y="70" font-size="13" fill="#c0caf5" opacity="0">h
    <animate attributeName="opacity" from="0" to="1"
             begin="0.58s" dur="0.01s" fill="freeze"/>
  </text>
  <!-- char 3 "o" -->
  <text x="204" y="70" font-size="13" fill="#c0caf5" opacity="0">o
    <animate attributeName="opacity" from="0" to="1"
             begin="0.66s" dur="0.01s" fill="freeze"/>
  </text>
  <!-- char 4 "a" -->
  <text x="212" y="70" font-size="13" fill="#c0caf5" opacity="0">a
    <animate attributeName="opacity" from="0" to="1"
             begin="0.74s" dur="0.01s" fill="freeze"/>
  </text>
  <!-- char 5 "m" -->
  <text x="220" y="70" font-size="13" fill="#c0caf5" opacity="0">m
    <animate attributeName="opacity" from="0" to="1"
             begin="0.82s" dur="0.01s" fill="freeze"/>
  </text>
  <!-- char 6 "i" -->
