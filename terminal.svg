    <text x="16" y="210" font-size="13">
      <tspan fill="#7aa2f7">  os      </tspan><tspan fill="#a9b1d6">macOS Sequoia  </tspan>
      <tspan fill="#565f89">·  </tspan>
      <tspan fill="#7aa2f7">wm   </tspan><tspan fill="#a9b1d6">AeroSpace</tspan>
