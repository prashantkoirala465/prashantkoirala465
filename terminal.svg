    <text x="16" y="122" font-size="13">
      <tspan fill="#565f89">  web   </tspan>
      <tspan fill="#73daca">prashantkoirala.info.np</tspan>
    </text>
    <text x="16" y="140" font-size="13">
      <tspan fill="#565f89">  focus </tspan>
      <tspan fill="#ff9e64">AlgoLab</tspan>
      <tspan fill="#565f89">  — making DSA actually learnable</tspan>
