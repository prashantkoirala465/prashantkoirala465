  <text x="188" y="174" font-size="13" fill="#c0caf5" opacity="0">c<animate attributeName="opacity" from="0" to="1" begin="3.00s" dur="0.01s" fill="freeze"/></text>
  <text x="196" y="174" font-size="13" fill="#c0caf5" opacity="0">a<animate attributeName="opacity" from="0" to="1" begin="3.07s" dur="0.01s" fill="freeze"/></text>
  <text x="204" y="174" font-size="13" fill="#c0caf5" opacity="0">t<animate attributeName="opacity" from="0" to="1" begin="3.14s" dur="0.01s" fill="freeze"/></text>
  <text x="212" y="174" font-size="13" fill="#c0caf5" opacity="0"> <animate attributeName="opacity" from="0" to="1" begin="3.21s" dur="0.01s" fill="freeze"/></text>
  <text x="220" y="174" font-size="13" fill="#c0caf5" opacity="0">a<animate attributeName="opacity" from="0" to="1" begin="3.28s" dur="0.01s" fill="freeze"/></text>
  <text x="228" y="174" font-size="13" fill="#c0caf5" opacity="0">b<animate attributeName="opacity" from="0" to="1" begin="3.35s" dur="0.01s" fill="freeze"/></text>
  <text x="236" y="174" font-size="13" fill="#c0caf5" opacity="0">o<animate attributeName="opacity" from="0" to="1" begin="3.42s" dur="0.01s" fill="freeze"/></text>
  <text x="244" y="174" font-size="13" fill="#c0caf5" opacity="0">u<animate attributeName="opacity" from="0" to="1" begin="3.49s" dur="0.01s" fill="freeze"/></text>
  <text x="252" y="174" font-size="13" fill="#c0caf5" opacity="0">t<animate attributeName="opacity" from="0" to="1" begin="3.56s" dur="0.01s" fill="freeze"/></text>
  <text x="260" y="174" font-size="13" fill="#c0caf5" opacity="0">.<animate attributeName="opacity" from="0" to="1" begin="3.63s" dur="0.01s" fill="freeze"/></text>
  <text x="268" y="174" font-size="13" fill="#c0caf5" opacity="0">t<animate attributeName="opacity" from="0" to="1" begin="3.70s" dur="0.01s" fill="freeze"/></text>
  <text x="276" y="174" font-size="13" fill="#c0caf5" opacity="0">x<animate attributeName="opacity" from="0" to="1" begin="3.77s" dur="0.01s" fill="freeze"/></text>
  <text x="284" y="174" font-size="13" fill="#c0caf5" opacity="0">t<animate attributeName="opacity" from="0" to="1" begin="3.84s" dur="0.01s" fill="freeze"/></text>

