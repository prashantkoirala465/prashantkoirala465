    <animate attributeName="opacity" from="0" to="1" begin="6.2s" dur="0.01s" fill="freeze"/>
    <text x="20" y="420" font-size="13">
      <tspan fill="#3fb950">prashantkoirala465</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">github</tspan><tspan fill="#e6edf3">:~$ </tspan>
    </text>
  </g>

  <text x="246" y="420" font-size="13" fill="#e6edf3" clip-path="url(#clip4)" opacity="0">
