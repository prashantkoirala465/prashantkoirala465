<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 568" width="800" height="568">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }
    </style>

    <!-- clipPath for command 1 wipe reveal -->
    <clipPath id="clip1">
      <rect id="clip1rect" x="188" y="44" width="0" height="22">
        <animate attributeName="width" from="0" to="600"
                 begin="0.5s" dur="0.6s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- clipPath for command 2 wipe reveal -->
    <clipPath id="clip2">
      <rect id="clip2rect" x="188" y="286" width="0" height="22">
        <animate attributeName="width" from="0" to="600"
                 begin="3.2s" dur="0.8s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- outer frame -->
  <rect width="800" height="568" rx="10" fill="#0d1117"/>

  <!-- title bar bg -->
  <rect width="800" height="38" rx="10" fill="#161b22"/>
  <rect y="20" width="800" height="18" fill="#161b22"/>

  <!-- traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>

  <!-- title bar text -->
  <text x="400" y="24" text-anchor="middle" font-size="12" fill="#484f58">
    prashantkoirala465 — zsh
  </text>

  <!-- terminal body -->
  <rect x="0" y="38" width="800" height="530" fill="#0d1117"/>

  <!-- bottom rounded cap -->
  <rect x="0" y="548" width="800" height="20" fill="#0d1117"/>
  <rect x="0" y="552" width="800" height="16" rx="10" fill="#0d1117"/>


  <!-- =========================================================
       ROW 0  y=60  PROMPT 1
       ========================================================= -->

  <!-- prompt segments: colored text in one line -->
  <text x="20" y="60" font-size="14">
    <tspan fill="#58a6ff">~/</tspan>
    <tspan fill="#484f58"> on </tspan>
    <tspan fill="#3fb950"> git:(</tspan>
    <tspan fill="#f78166">main</tspan>
    <tspan fill="#3fb950">)</tspan>
    <tspan fill="#e3b341"> ❯</tspan>
    <tspan fill="#484f58"> </tspan>
  </text>

  <!-- command 1 text: revealed by clipPath wipe -->
  <text x="188" y="60" font-size="14" fill="#e6edf3" clip-path="url(#clip1)">neofetch</text>

  <!-- typing cursor 1: visible while typing, hides when output appears -->
  <rect x="188" y="44" width="8" height="16" rx="1" fill="#3fb950">
    <animate attributeName="x" from="188" to="255"
             begin="0.5s" dur="0.6s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0"
             begin="1.4s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- =========================================================
       NEOFETCH OUTPUT  rows 2-9  (appears at t=1.5s)
       Box drawn with rects, text positioned absolutely
       ========================================================= -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="1.5s" dur="0.01s" fill="freeze"/>

    <!-- box outline: rect stroke only -->
    <rect x="20" y="70" width="580" height="200" rx="4"
          fill="none" stroke="#21262d" stroke-width="1"/>

    <!-- left column separator line -->
    <line x1="220" y1="70" x2="220" y2="270"
          stroke="#21262d" stroke-width="1"/>

    <!-- LEFT COLUMN: ascii-style username block -->
    <!-- username -->
    <text x="36" y="100" font-size="14" font-weight="bold">
      <tspan fill="#58a6ff">prashantkoirala465</tspan>
      <tspan fill="#484f58">@</tspan>
      <tspan fill="#58a6ff">github</tspan>
    </text>

    <!-- separator under username -->
    <line x1="36" y1="108" x2="204" y2="108"
          stroke="#21262d" stroke-width="1"/>

    <!-- color palette dots -->
    <circle cx="40"  cy="130" r="7" fill="#f78166"/>
    <circle cx="58"  cy="130" r="7" fill="#e3b341"/>
    <circle cx="76"  cy="130" r="7" fill="#3fb950"/>
    <circle cx="94"  cy="130" r="7" fill="#58a6ff"/>
    <circle cx="112" cy="130" r="7" fill="#bc8cff"/>
    <circle cx="130" cy="130" r="7" fill="#39c5cf"/>

    <!-- location + focus under dots -->
    <text x="36" y="158" font-size="12" fill="#484f58">Kathmandu, Nepal</text>
    <text x="36" y="176" font-size="12">
      <tspan fill="#484f58">focus: </tspan>
      <tspan fill="#e3b341">AlgoLab</tspan>
    </text>
    <text x="36" y="194" font-size="12">
      <tspan fill="#484f58">web:   </tspan>
      <tspan fill="#39c5cf">prashantkoirala.info.np</tspan>
    </text>
    <text x="36" y="212" font-size="12">
      <tspan fill="#484f58">loves: </tspan>
      <tspan fill="#bc8cff">systems </tspan>
      <tspan fill="#3fb950">graphics </tspan>
      <tspan fill="#e3b341">TUIs</tspan>
    </text>
    <text x="36" y="252" font-size="12" fill="#21262d">·</text>

    <!-- RIGHT COLUMN: system info -->
    <text x="236" y="92"  font-size="13"><tspan fill="#484f58">OS     </tspan><tspan fill="#e6edf3">macOS Sequoia (ARM)</tspan></text>
    <text x="236" y="114" font-size="13"><tspan fill="#484f58">Host   </tspan><tspan fill="#e6edf3">MacBook Pro M-series</tspan></text>
    <text x="236" y="136" font-size="13"><tspan fill="#484f58">WM     </tspan><tspan fill="#e6edf3">AeroSpace</tspan></text>
    <text x="236" y="158" font-size="13"><tspan fill="#484f58">Bar    </tspan><tspan fill="#e6edf3">SketchyBar</tspan></text>
    <text x="236" y="180" font-size="13"><tspan fill="#484f58">Editor </tspan><tspan fill="#e6edf3">Neovim</tspan></text>
    <text x="236" y="202" font-size="13"><tspan fill="#484f58">Shell  </tspan><tspan fill="#e6edf3">zsh</tspan></text>
    <text x="236" y="224" font-size="13"><tspan fill="#484f58">Term   </tspan><tspan fill="#e6edf3">WezTerm</tspan></text>
    <text x="236" y="246" font-size="13"><tspan fill="#484f58">Uptime </tspan><tspan fill="#3fb950">focusing</tspan></text>
  </g>


  <!-- =========================================================
       ROW 13  y=302  PROMPT 2  (appears at t=2.8s)
       ========================================================= -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="2.8s" dur="0.01s" fill="freeze"/>
    <text x="20" y="302" font-size="14">
      <tspan fill="#58a6ff">~/</tspan>
      <tspan fill="#484f58"> on </tspan>
      <tspan fill="#3fb950"> git:(</tspan>
      <tspan fill="#f78166">main</tspan>
      <tspan fill="#3fb950">)</tspan>
      <tspan fill="#e3b341"> ❯</tspan>
    </text>
  </g>

  <!-- command 2: revealed by wipe (opacity starts at 0, unhides at 3.2s) -->
  <text x="188" y="302" font-size="14" fill="#e6edf3" clip-path="url(#clip2)"
        opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="3.2s" dur="0.01s" fill="freeze"/>
    eza --long --icons projects/
  </text>

  <!-- typing cursor 2 -->
  <rect x="188" y="286" width="8" height="16" rx="1" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="3.2s" dur="0.01s" fill="freeze"/>
    <animate attributeName="x" from="188" to="415"
             begin="3.2s" dur="0.8s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0"
             begin="4.2s" dur="0.01s" fill="freeze"/>
  </rect>


  <!-- =========================================================
       EZA OUTPUT  rows 14-20  (appears at t=4.3s)
       ========================================================= -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="4.3s" dur="0.01s" fill="freeze"/>

    <!-- header -->
    <text x="20" y="328" font-size="12" fill="#30363d">
      Permissions  Size  Modified  Name
    </text>

    <!-- rule under header -->
    <line x1="20" y1="334" x2="760" y2="334" stroke="#21262d" stroke-width="1"/>

    <!-- files - each row: perms | size | date | name | meta -->
    <!-- Singularity -->
    <text x="20"  y="352" font-size="13" fill="#484f58">drwxr-xr-x</text>
    <text x="130" y="352" font-size="13" fill="#30363d">  -</text>
    <text x="160" y="352" font-size="13" fill="#30363d">Mar  7</text>
    <text x="218" y="352" font-size="13" fill="#58a6ff">Singularity</text>
    <text x="330" y="352" font-size="12" fill="#30363d">Three.js · WebGPU · GLSL</text>

    <!-- AlgoLab -->
    <text x="20"  y="374" font-size="13" fill="#484f58">drwxr-xr-x</text>
    <text x="130" y="374" font-size="13" fill="#30363d">  -</text>
    <text x="160" y="374" font-size="13" fill="#30363d">Mar  7</text>
    <text x="218" y="374" font-size="13" fill="#58a6ff">AlgoLab</text>
    <text x="290" y="374" font-size="13" fill="#3fb950">[active]</text>
    <text x="360" y="374" font-size="12" fill="#30363d">TypeScript · MIT</text>

    <!-- Sign2Text -->
    <text x="20"  y="396" font-size="13" fill="#484f58">drwxr-xr-x</text>
    <text x="130" y="396" font-size="13" fill="#30363d">  -</text>
    <text x="160" y="396" font-size="13" fill="#30363d">Feb 28</text>
    <text x="218" y="396" font-size="13" fill="#58a6ff">Sign2Text</text>
    <text x="330" y="396" font-size="12" fill="#30363d">Python · Computer Vision · JS</text>

    <!-- BusTracker -->
    <text x="20"  y="418" font-size="13" fill="#484f58">drwxr-xr-x</text>
    <text x="130" y="418" font-size="13" fill="#30363d">  -</text>
    <text x="160" y="418" font-size="13" fill="#30363d">Feb 14</text>
    <text x="218" y="418" font-size="13" fill="#58a6ff">BusTracker</text>
    <text x="330" y="418" font-size="12" fill="#30363d">C++ · Arduino · ESP8266</text>

    <!-- web-portfolio -->
    <text x="20"  y="440" font-size="13" fill="#484f58">drwxr-xr-x</text>
    <text x="130" y="440" font-size="13" fill="#30363d">  -</text>
    <text x="160" y="440" font-size="13" fill="#30363d">Jan 30</text>
    <text x="218" y="440" font-size="13" fill="#58a6ff">web-portfolio</text>
    <text x="330" y="440" font-size="13" fill="#e3b341">★ 54</text>
    <text x="374" y="440" font-size="12" fill="#30363d">  GSAP · Lenis · JS</text>

    <!-- ASCII-Art-Generator -->
    <text x="20"  y="462" font-size="13" fill="#484f58">drwxr-xr-x</text>
    <text x="130" y="462" font-size="13" fill="#30363d">  -</text>
    <text x="160" y="462" font-size="13" fill="#30363d">Jan 12</text>
    <text x="218" y="462" font-size="13" fill="#58a6ff">ASCII-Art-Generator</text>
    <text x="382" y="462" font-size="12" fill="#30363d">Rust · Cargo · CLI</text>
  </g>


  <!-- =========================================================
       FINAL PROMPT  row 20  y=500  (appears at t=5.5s)
       ========================================================= -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1"
             begin="5.5s" dur="0.01s" fill="freeze"/>
    <text x="20" y="500" font-size="14">
      <tspan fill="#58a6ff">~/</tspan>
      <tspan fill="#484f58"> on </tspan>
      <tspan fill="#3fb950"> git:(</tspan>
      <tspan fill="#f78166">main</tspan>
      <tspan fill="#3fb950">)</tspan>
      <tspan fill="#e3b341"> ❯</tspan>
    </text>
    <!-- blinking cursor -->
    <rect x="188" y="484" width="8" height="16" rx="1" fill="#e6edf3">
      <animate attributeName="opacity" values="1;0;1" dur="1s"
               begin="5.5s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
