       PROMPT 3  (t=4.0s)
       ====================================================== -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.01s" fill="freeze"/>
    <text x="20" y="288" font-size="13">
      <tspan fill="#3fb950">prashantkoirala465</tspan><tspan fill="#484f58">@</tspan><tspan fill="#58a6ff">github</tspan><tspan fill="#e6edf3">:~$ </tspan>
